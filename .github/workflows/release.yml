name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

# Required so softprops/action-gh-release can create the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Verify version tag matches build-app.sh
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          SCRIPT_VERSION=$(grep -E '^VERSION=' build-app.sh | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$SCRIPT_VERSION" ]; then
            echo "Tag $TAG implies version $TAG_VERSION but build-app.sh has VERSION=\"$SCRIPT_VERSION\""
            exit 1
          fi
          echo "version=${SCRIPT_VERSION}" >> "$GITHUB_OUTPUT"
        id: version

      - name: Import Developer ID cert into a temporary keychain
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend our keychain so codesign finds the Developer ID identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"
          # Confirm the identity is visible to codesign.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build, sign, notarize, staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          ./build-app.sh --dmg
          ls -la .build/*.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: .build/*.dmg
          # `.build` is a dotted directory; v4 excludes hidden paths by default.
          include-hidden-files: true

      - name: Prepare release notes body
        id: notes
        run: |
          set -euo pipefail
          # Use RELEASE_NOTES.md if you want real bullet points on the release
          # page (and on infinityterminal.com via update-web.yml). When absent,
          # action-gh-release just appends the auto-generated **Full Changelog**
          # link, which is harmless but uninformative.
          if [ -f RELEASE_NOTES.md ]; then
            echo "path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
          else
            : > "$RUNNER_TEMP/notes.md"
            echo "path=$RUNNER_TEMP/notes.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/*.dmg
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false
