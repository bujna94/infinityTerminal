name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build + sign + notarize
        # electron-builder picks up signing automatically from CSC_LINK /
        # CSC_KEY_PASSWORD and notarizes via APPLE_ID /
        # APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID.
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM }}
          CSC_KEY_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          export CSC_LINK="$RUNNER_TEMP/cert.p12"
          node scripts/patch-electron-builder.js
          npx electron-builder --mac
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Resolve artifacts
        id: artifacts
        run: |
          set -euo pipefail
          DMG=$(ls dist/*.dmg | head -1)
          ZIP=$(ls dist/*.zip | head -1 || true)
          echo "dmg=${DMG}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          generate_release_notes: true
          draft: false
          prerelease: false
