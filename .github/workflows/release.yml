name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

# Required so softprops/action-gh-release can create the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Verify version tag matches build-app.sh
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          SCRIPT_VERSION=$(grep -E '^VERSION=' build-app.sh | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$SCRIPT_VERSION" ]; then
            echo "Tag $TAG implies version $TAG_VERSION but build-app.sh has VERSION=\"$SCRIPT_VERSION\""
            exit 1
          fi
          echo "version=${SCRIPT_VERSION}" >> "$GITHUB_OUTPUT"
        id: version

      - name: Import Developer ID cert into a temporary keychain
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend our keychain so codesign finds the Developer ID identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"
          # Confirm the identity is visible to codesign.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build, sign, notarize, staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          ./build-app.sh --dmg
          ls -la .build/*.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: .build/*.dmg

      - name: Prepare release notes body
        id: notes
        run: |
          set -euo pipefail
          # Use RELEASE_NOTES.md if you want real bullet points on the release
          # page (and on infinityterminal.com via update-web.yml). When absent,
          # action-gh-release just appends the auto-generated **Full Changelog**
          # link, which is harmless but uninformative.
          if [ -f RELEASE_NOTES.md ]; then
            echo "path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
          else
            : > "$RUNNER_TEMP/notes.md"
            echo "path=$RUNNER_TEMP/notes.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/*.dmg
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false

      # ── Sparkle: sign the DMG with the EdDSA private key and append a new
      # <item> to appcast.xml in the website repo. Self-skips at runtime if
      # SPARKLE_PRIVATE_ED_KEY isn't set so the workflow stays green before
      # one-time Sparkle setup is done.
      - name: Sign DMG for Sparkle and update appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          WEB_REPO_PAT: ${{ secrets.WEB_REPO_PAT }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_PRIVATE_ED_KEY}" ]; then
            echo "SPARKLE_PRIVATE_ED_KEY not set — skipping Sparkle sign + appcast publish."
            exit 0
          fi

          # Pull Sparkle's CLI tools (sign_update lives in the binary release).
          SPARKLE_VERSION=2.6.0
          curl -sSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

          DMG=$(ls .build/*.dmg | head -1)
          DMG_NAME=$(basename "$DMG")
          VERSION="${TAG#v}"

          # Restore the private key into a temporary file
          KEY_FILE="$RUNNER_TEMP/sparkle.key"
          umask 077
          echo "${SPARKLE_PRIVATE_ED_KEY}" | base64 --decode > "$KEY_FILE"

          # sign_update outputs: sparkle:edSignature="..." length="..."
          SIGN_OUT=$("$RUNNER_TEMP/sparkle/bin/sign_update" -f "$KEY_FILE" "$DMG")
          rm -f "$KEY_FILE"
          ED_SIG=$(echo "$SIGN_OUT" | sed -E 's/.*sparkle:edSignature="([^"]+)".*/\1/')
          LEN=$(echo "$SIGN_OUT" | sed -E 's/.*length="([0-9]+)".*/\1/')
          PUB_DATE=$(LC_TIME=en_US.UTF-8 date -u +"%a, %d %b %Y %H:%M:%S +0000")
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${DMG_NAME}"

          # Clone the web repo, prepend a new <item> inside <channel>, push.
          git clone --depth 1 "https://x-access-token:${WEB_REPO_PAT}@github.com/bujna94/infinityTerminalWeb.git" "$RUNNER_TEMP/web"
          cd "$RUNNER_TEMP/web"

          export VERSION PUB_DATE DOWNLOAD_URL LEN ED_SIG
          python3 - <<'PYEOF'
          import os
          version = os.environ['VERSION']
          pub_date = os.environ['PUB_DATE']
          url = os.environ['DOWNLOAD_URL']
          length = os.environ['LEN']
          ed_sig = os.environ['ED_SIG']
          with open('appcast.xml') as f: src = f.read()
          item = f'''    <item>
              <title>Version {version}</title>
              <pubDate>{pub_date}</pubDate>
              <sparkle:version>{version}</sparkle:version>
              <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              <enclosure
                  url="{url}"
                  length="{length}"
                  type="application/octet-stream"
                  sparkle:edSignature="{ed_sig}" />
            </item>
          '''
          if '<language>en</language>' in src:
              new = src.replace('<language>en</language>',
                                '<language>en</language>\n' + item, 1)
          else:
              new = src.replace('</channel>', item + '  </channel>', 1)
          with open('appcast.xml', 'w') as f: f.write(new)
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Append Sparkle appcast entry for ${TAG}"
          git push origin main
