name: Update website on release

on:
  release:
    types: [published]

jobs:
  update-web:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version and release notes
        id: info
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Fetch release body via GitHub API
          gh api "repos/${{ github.repository }}/releases/tags/${GITHUB_REF_NAME}" --jq '.body' > /tmp/release_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone web repo
        run: |
          git clone https://x-access-token:${{ secrets.WEB_REPO_PAT }}@github.com/bujna94/infinityTerminalWeb.git web

      - name: Update index.html
        run: |
          cd web
          python3 - "${{ steps.info.outputs.version }}" /tmp/release_body.md <<'PYEOF'
          import sys, re
          from datetime import datetime, timezone

          version = sys.argv[1]
          with open(sys.argv[2]) as f:
              body = f.read()
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          with open("index.html") as f:
              html = f.read()

          # 1. softwareVersion in structured data
          html = re.sub(
              r'"softwareVersion":\s*"[^"]*"',
              f'"softwareVersion": "{version}"',
              html
          )

          # 2. datePublished in structured data
          html = re.sub(
              r'"datePublished":\s*"[^"]*"',
              f'"datePublished": "{date}"',
              html
          )

          # 3. Download section version line: <p>v1.0.x — ...
          html = re.sub(
              r'(<p>v)[0-9.]+',
              rf'\g<1>{version}',
              html
          )

          # 4. "What's New in v..." heading (handles both straight and curly apostrophes)
          html = re.sub(
              r"(What.s New in v)[0-9.]+",
              rf"\g<1>{version}",
              html
          )

          # 5. Build changelog <li> items from release body bullet points
          items = []
          for line in body.splitlines():
              line = line.strip()
              if re.match(r'^[-*]', line):
                  line = re.sub(r'^[-*]\s*', '', line)
                  # Convert **bold** to <strong>
                  line = re.sub(r'\*\*([^*]+)\*\*', r'<strong>\1</strong>', line)
                  # Convert `code` to <code>
                  line = re.sub(r'`([^`]+)`', r'<code>\1</code>', line)
                  items.append(f"                <li>{line}</li>")

          if items:
              items_html = "\n".join(items)
              html = re.sub(
                  r'(<ul class="tight">)\s*?(<li>.*?</li>\s*?)+(\s*</ul>)',
                  rf'\1\n{items_html}\n              \3',
                  html,
                  count=1,
                  flags=re.DOTALL
              )

          with open("index.html", "w") as f:
              f.write(html)
          PYEOF

      - name: Commit and push
        run: |
          cd web
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update to v${{ steps.info.outputs.version }}"
            git push
          fi
